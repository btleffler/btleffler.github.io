<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN"
	"http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html>
	<head>
		<title>btleffler$ _</title>
		<meta charset="utf-8">
		<meta http-equiv="X-UA-Compatible" content="IE=edge">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<link rel="stylesheet" href="solarized-dark.css" type="text/css" media="all" />
		<link href='//fonts.googleapis.com/css?family=Inconsolata&subset=latin,latin-ext' rel='stylesheet' type='text/css'>
		<style>
			body {
				position: absolute;
				top: 0;
				left: 0;
				bottom: 0;
				right: 0;
				overflow-y: scroll;
				overflow-x: hidden;
			}
			html {
				overflow-y: auto;
			}
			html, body {
				background-color: #002b36;
				color: #839496;
				margin: 0;
				padding: 0;
				font-size: 14pt;
			}
			html, body, pre, code {
				font-family: "Inconsolata", sans-serif;
			}
			a {
				text-decoration: underline;
				color: #b58900;
			}
			a:visted {
				text-decoration: underline;
				color: #b58900;
			}
			a:hover {
				text-decoration: underline;
				color: #b58900;
			}
			#console {
				height: 400px;
				width: 750px;
				position:relative;
				margin: 0 auto;
				tab-size: 2;
				-moz-tab-size: 2;
				-o-tab-size: 2;
				-webkit-tab-size: 2;
			}
			.jqconsole {
				padding: 10px;
				padding-bottom: 10px;
			}
			.jqconsole-cursor {
				background-color: #839496;
				animation: cursor-fade 1s infinite;
				-webkit-animation: cursor-fade 1s infinite;
				-moz-animation: cursor-fade 1s infinite;
				-o-animation: cursor-fade 1s infinite;
				-ms-animation: cursor-fade 1s infinite;
			}
			.jqconsole-blurred .jqconsole-cursor {
				background-color: #839496;
			}
			.jqconsole-prompt {
				color: #657b83;
			}
			.jqconsole-old-prompt {
				color: #657b83;
				font-weight: normal;
			}
			.jqconsole-input {
				color: #839496;
			}
			.jqconsole-old-input {
				color: #839496;
				font-weight: normal;
			}
			.brace {
				color: #268bd2;
			}
			.paran {
				color: #839496;
			}
			.bracket {
				color: #268bd2;
			}
			.jqconsole-composition {
				background-color: #dc322f;
			}

			/*
			  Scroll bar
			 */
			::-webkit-scrollbar {
				width: 10px;
				height: 10px;
			}
			::-webkit-scrollbar-track {
				background: transparent;
			}
			::-webkit-scrollbar-thumb {
				background: #839496;
				border-radius: 2px;
			}

			/*
			  Cursor Fade
			 */
			@keyframes cursor-fade {
				0% { opacity: 0; }
				50% { opacity: 1; }
				100% { opacity: 0; }
			}
			@-webkit-keyframes cursor-fade {
				0% { opacity: 0; }
				50% { opacity: 1; }
				100% { opacity: 0; }
			}
			@-moz-keyframes cursor-fade {
				0% { opacity: 0; }
				50% { opacity: 1; }
				100% { opacity: 0; }
			}
			@-o-keyframes cursor-fade {
				0% { opacity: 0; }
				50% { opacity: 1; }
				100% { opacity: 0; }
			}
			@-ms-keyframes cursor-fade {
				0% { opacity: 0; }
				50% { opacity: 1; }
				100% { opacity: 0; }
			}

			/*
			  Smartphone
			 */
			@media only screen and (min-device-width : 320px) and (max-device-width : 800px) {
				html, body { font-size: 10pt; }
			}
		</style>
	</head>
	<body>
		<div id="console"></div>
		<script src="//ajax.googleapis.com/ajax/libs/jquery/2.1.0/jquery.min.js" type="text/javascript" charset="utf-8"></script>
		<script src="js/jq-console/jqconsole.min.js"></script>
		<script>
			$(function() {
				window.btleffler = {
					"contact": {
						"email": "btleffler@gmail.com",
						"twitter": "@bleff"
					},
					"Ajaxer": "http://btleffler.github.io/Ajaxer",
					"GitHub": "https://github.com/btleffler",
					"jQuery-SwapStyle": "http://btleffler.github.io/jQuery-SwapStyle",
					"Node File-List": "https://www.npmjs.org/package/file-list",
					"RandomStream": "http://random.btleffler.com/",
					"StarsTrack": "http://btleffler.com",
				};

				// Creating the console.
				var header = '\nvar btleffler = {\n' +
							 '\t"contact": {\n' +
							 '\t\t"email": "<a href="mailto:btleffler@gmail.com" title="email">btleffler@gmail.com</a>",\n' +
							 '\t\t"twitter": "<a href="https://twitter.com/bleff" title="twitter">@bleff</a>"\n' +
							 '\t},\n' +
							 '\t"Ajaxer": "<a href="http://btleffler.github.io/Ajaxer">http://btleffler.github.io/Ajaxer</a>",\n' +
							 '\t"GitHub": "<a href="https://github.com/btleffler" title="btleffler on Github">https://github.com/btleffler</a>",\n' +
							 '\t"jQuery-SwapStyle": "<a href="http://btleffler.github.io/jQuery-SwapStyle" title="jQuery-SwapStyle">http://btleffler.github.io/jQuery-SwapStyle</a>",\n' +
							 '\t"Node File-List": "<a href="https://www.npmjs.org/package/file-list" title="Node File-List">https://www.npmjs.org/package/file-list</a>,\n' +
							 '\t"RandomStream": "<a href="http://random.btleffler.com/" title="RandomStream">http://random.btleffler.com</a>",\n' +
							 '\t"StarsTrack": "<a href="http://btleffler.com/" title="StarsTrack">http://btleffler.com</a>"\n' +
							 '};\n\n' +
							 '/**\n' +
							 ' * light(); or dark(); or theme("light"|"dark"); // Defaults to dark\n' +
							 ' */\n\n',
				$console = $("#console"),
				$window = $(window),
				$title = $(document).find("title"),
				smartPhoneWidth = 800,
				initialWidth = $window.innerWidth();

				$console.css({
					"height": $window.innerHeight(),
					"width": initialWidth <= smartPhoneWidth ? initialWidth : Math.floor(initialWidth * 0.75)
				});

				$window.bind("resize", function () {
					var width = $window.innerWidth(),
						height = $window.innerHeight();

					$console.css({
						"height": height,
						"width": width <= smartPhoneWidth ? width : Math.floor(width * 0.75)
					});

					$console.children("div").scrollTop($console.children("div")[0].scrollHeight - height);
				});


				window.jqconsole = $('#console').jqconsole(null, ' \u003E ', '.. ');

				jqconsole.SetIndentWidth(2);
				jqconsole.RegisterMatching('{', '}', 'brace');
				jqconsole.RegisterMatching('(', ')', 'paran');
				jqconsole.RegisterMatching('[', ']', 'bracket');
				jqconsole.Write(header, null, false);

				function processResult (result) {
					if (!result || typeof result !== "string")
						return result;

					// url
					if (result.match(/^https?\:\/\//))
						return '<a href="' + result + '" title="' + result + '">' + result + '</a>';

					// email
					if (result.match(/^\w+@[a-zA-Z_]+?\.[a-zA-Z]{2,3}$/))
						return '<a href="mailto:' + result + '" title="Email ' + result + '">' + result + '</a>';

					// twitter
					if (result.match(/^@[A-Za-z0-9_]{1,15}$/))
						return '<a href="https://twitter.com/' + result + '" title="' + result + '">' + result + '</a>';

					return result;
				}

				// Handle a command.
				var handler = function(command) {
					var result;

					if (command) {
						try {
							result = window.eval(command);

							jqconsole.Write('==> ' + processResult(result) + '\n', null, false);
						} catch (e) {
							jqconsole.Write('ERROR: ' + e.message + '\n');
						}
					}
					jqconsole.Prompt(true, handler, function(command) {
						// Continue line if can't compile the command.
						try {
							Function(command);
						} catch (e) {
							if (/[\[\{\(]$/.test(command)) {
								return 1;
							} else {
								return 0;
							}
						}
						return false;
					});
				};

				// Initiate the first prompt.
				handler();

				// Title fun
				setInterval(function () {
					var title = $title.text();

					if (title.match(/_$/))
						title = title.replace(/_$/, ' ');
					else
						title = title.replace(/\s*$/, ' _');

					$title.text(title);
				}, 1000);

				/**
				 * Global stuff
				 */
				window.theme = function theme (theme) {
					var color = theme == "light" ? "#fdf6e3" : "#002b36";

					$("html, body, pre")
						.css({ "background-color": color });
				};

				window.light = function light () { theme("light"); };
				window.dark = function dark () { theme("dark"); };
			});

			/**
			 * Google Analytics
			 */
			(function(i,s,o,g,r,a,m){i['GoogleAnalyticsObject']=r;i[r]=i[r]||function(){
				(i[r].q=i[r].q||[]).push(arguments);},i[r].l=1*new Date();a=s.createElement(o),
				m=s.getElementsByTagName(o)[0];a.async=1;a.src=g;m.parentNode.insertBefore(a,m);
			})(window,document,'script','//www.google-analytics.com/analytics.js','ga');

			ga('create', 'UA-49098224-3', 'btleffler.github.io');
			ga('send', 'pageview');
		</script>
	</body>
</html>
