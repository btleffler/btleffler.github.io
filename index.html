<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN"
	"http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html>
	<head>
		<title>btleffler$ _</title>
		<link rel="stylesheet" href="solarized-dark.css" type="text/css" media="all" />
		<link href='//fonts.googleapis.com/css?family=Inconsolata&subset=latin,latin-ext' rel='stylesheet' type='text/css'>
		<style>
			body {
				position: absolute;
				top: 0;
				left: 0;
				bottom: 0;
				right: 0;
				overflow-y: scroll;
				overflow-x: hidden;
			}
			html {
				overflow-y: auto;
			}
			html, body {
				background-color: #002b36;
				color: #839496;
				margin: 0;
				padding: 0;
				font-size: 13pt;
			}
			html, body, pre, code {
				font-family: "Inconsolata", sans-serif;
			}
			#console {
				height: 400px;
				width: 750px;
				position:relative;
				margin: 0 auto;
				tab-size: 2;
				-moz-tab-size: 2;
				-o-tab-size: 2;
				-webkit-tab-size: 2;
			}
			.jqconsole {
				padding: 10px;
				padding-bottom: 10px;
			}
			.jqconsole-cursor {
				background-color: #839496;
			}
			.jqconsole-blurred .jqconsole-cursor {
				background-color: #839496;
			}
			.jqconsole-prompt {
				color: #657b83;
			}
			.jqconsole-old-prompt {
				color: #657b83;
				font-weight: normal;
			}
			.jqconsole-input {
				color: #839496;
			}
			.jqconsole-old-input {
				color: #839496;
				font-weight: normal;
			}
			.brace {
				color: #268bd2;
			}
			.paran {
				color: #839496;
			}
			.bracket {
				color: #268bd2;
			}
			.jqconsole-composition {
				background-color: #dc322f;
			}
			::-webkit-scrollbar {
				width: 10px;
				height: 10px;
			}
			::-webkit-scrollbar-track {
				background: #002b36;
			}
			::-webkit-scrollbar-thumb {
				background: #839496;
				border-radius: 2px;
			}
		</style>
	</head>
	<body>
		<div id="console"></div>
		<script src="//ajax.googleapis.com/ajax/libs/jquery/2.1.0/jquery.min.js" type="text/javascript" charset="utf-8"></script>
		<script src="js/jq-console/jqconsole.min.js"></script>
			 <script>
			$(function() {
				window.btleffler = {
					"contact": {
						"email": "btleffler@gmail.com",
						"twitter": "@bleff"
					},
					"StarsTrack": "http://btleffler.com",
					"Ajaxer": "http://btleffler.github.io/Ajaxer",
					"jQuery-SwapStyle": "http://btleffler.github.io/jQuery-SwapStyle"
				};

				// Creating the console.
				var header = '\nvar btleffler = {\n' +
							 '\t"contact": {\n' +
							 '\t\t"email": "btleffler@gmail.com",\n' +
							 '\t\t"twitter": "@bleff"\n' +
							 '\t},\n' +
							 '\t"StarsTrack": "http://btleffler.com",\n' +
							 '\t"Ajaxer": "http://btleffler.github.io/Ajaxer",\n' +
							 '\t"jQuery-SwapStyle": "http://btleffler.github.io/jQuery-SwapStyle"\n' +
							 '};\n\n',
				$console = $("#console"),
				$window = $(window);

				$console.css({
					"height": $window.innerHeight(),
					"width": Math.floor($window.innerWidth() * 0.75)
				});

				$window.bind("resize", function () {
					$console.css({
						"height": $window.innerHeight(),
						"width": Math.floor($window.innerWidth() * 0.75)
					});

					$console.children("div").scrollTop($console.children("div")[0].scrollHeight - $window.innerHeight());
				});


				window.jqconsole = $('#console').jqconsole(header, ' \u003E ', '.. ');

				jqconsole.RegisterMatching('{', '}', 'brace');
				jqconsole.RegisterMatching('(', ')', 'paran');
				jqconsole.RegisterMatching('[', ']', 'bracket');
				// Handle a command.
				var handler = function(command) {
					if (command) {
						try {
							jqconsole.Write('==> ' + window.eval(command) + '\n');
						} catch (e) {
							jqconsole.Write('ERROR: ' + e.message + '\n');
						}
					}
					jqconsole.Prompt(true, handler, function(command) {
						// Continue line if can't compile the command.
						try {
							Function(command);
						} catch (e) {
							if (/[\[\{\(]$/.test(command)) {
								return 1;
							} else {
								return 0;
							}
						}
						return false;
					});
				};

				// Initiate the first prompt.
				handler();
			});
		</script>
	</body>
</html>
